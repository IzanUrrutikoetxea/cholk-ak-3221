name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Inject API URL
        run: |
          echo '{"ApiBaseUrl":"${{ secrets.API_BASE_URL }}"}' \
            > cholk-ak-3221/wwwroot/appsettings.json

      - name: Publish Blazor
        run: |
          dotnet publish cholk-ak-3221/cholk-ak-3221.csproj \
            -c Release -o publish

      - name: Fix base href and styles path for GitHub Pages
        run: |
          sed -i 's|<base href="/" />|<base href="/cholk-ak-3221/" />|g' \
            publish/wwwroot/index.html
          sed -i 's|href="cholk-ak-3221.styles.css"|href="/cholk-ak-3221/cholk-ak-3221.styles.css"|g' \
            publish/wwwroot/index.html

      - name: SPA routing fix (404.html)
        run: cp publish/wwwroot/index.html publish/wwwroot/404.html

      - name: Disable Jekyll
        run: touch publish/wwwroot/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: publish/wwwroot
          publish_branch: gh-pages
